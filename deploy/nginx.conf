server {
    listen 80;
    server_name _;

    # 站點根目錄（以網站根為基準）
    root /usr/share/nginx/html;
    index index.html;

    # 預設路由：僅提供存在的靜態檔案
    location / {
        try_files $uri $uri/ =404;
    }

    # 靜態資產：設定快取與不列印存取記錄
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }
}